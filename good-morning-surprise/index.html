<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no,email=no,address=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#fff3ea">
  <meta name="description" content="一份可以在微信里打开的早安惊喜。">
  <meta property="og:type" content="website">
  <meta property="og:title" content="早安，亲爱的张舒淇">
  <meta property="og:description" content="今天的第一束光，想先替我抱抱你。">
  <meta property="og:image" content="assets/morning-bg.png">
  <title>早安，亲爱的张舒淇</title>
  <style>
    :root {
      --ink: #3e302d;
      --muted: #76645f;
      --paper: rgba(255, 250, 244, 0.86);
      --paper-solid: #fff8f0;
      --rose: #d98a8c;
      --rose-dark: #a85e62;
      --sage: #78896f;
      --gold: #c49b57;
      --shadow: rgba(68, 41, 31, 0.22);
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      min-height: 100%;
      background: #f5e6dc;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background: #f5e6dc;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .page {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: max(28px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
      isolation: isolate;
    }

    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      background:
        linear-gradient(90deg, rgba(255, 247, 238, 0.18), rgba(255, 242, 229, 0.56)),
        url("assets/morning-bg.png") center / cover no-repeat;
      transform: scale(1.02);
    }

    .page::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 22% 20%, rgba(255, 255, 255, 0.62), transparent 30%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(98, 73, 62, 0.16));
      pointer-events: none;
    }

    .petals {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .petal {
      position: absolute;
      width: 7px;
      height: 12px;
      border-radius: 8px 8px 8px 2px;
      background: rgba(222, 139, 141, 0.46);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
      animation: drift linear infinite;
      opacity: 0.76;
    }

    @keyframes drift {
      from {
        transform: translate3d(0, -14vh, 0) rotate(0deg);
      }

      to {
        transform: translate3d(var(--x), 112vh, 0) rotate(360deg);
      }
    }

    .card {
      width: min(680px, 100%);
      padding: clamp(24px, 6vw, 54px);
      border: 1px solid rgba(255, 255, 255, 0.66);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 28px 80px var(--shadow);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
    }

    .date {
      margin: 0 0 18px;
      color: var(--sage);
      font-size: 14px;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      max-width: 10em;
      font-size: clamp(42px, 9vw, 82px);
      line-height: 1.05;
      font-weight: 600;
      letter-spacing: 0;
    }

    .lead {
      max-width: 34em;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: clamp(16px, 2.6vw, 20px);
      line-height: 1.9;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      padding: 0 22px;
      color: #fffaf5;
      background: linear-gradient(135deg, var(--rose-dark), var(--rose), var(--gold));
      box-shadow: 0 12px 28px rgba(168, 94, 98, 0.28);
      font-weight: 700;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 8px 20px rgba(168, 94, 98, 0.24);
    }

    button:focus-visible {
      outline: 2px solid rgba(168, 94, 98, 0.5);
      outline-offset: 3px;
    }

    .ghost {
      color: var(--rose-dark);
      background: rgba(255, 250, 244, 0.72);
      border: 1px solid rgba(168, 94, 98, 0.22);
      box-shadow: none;
    }

    .letter {
      display: grid;
      grid-template-rows: 0fr;
      margin-top: 26px;
      overflow: hidden;
      transition: grid-template-rows 520ms ease;
    }

    .letter.open {
      grid-template-rows: 1fr;
    }

    .letter-inner {
      min-height: 0;
    }

    .note {
      position: relative;
      margin: 0;
      padding: 22px;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(255, 247, 238, 0.88)),
        var(--paper-solid);
      color: #4d3d38;
      line-height: 1.95;
      box-shadow: inset 0 0 0 1px rgba(196, 155, 87, 0.16);
    }

    .reason {
      display: inline-block;
      margin-top: 16px;
      color: var(--rose-dark);
      font-weight: 700;
    }

    .tiny {
      margin: 20px 0 0;
      color: rgba(62, 48, 45, 0.66);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (hover: hover) {
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 34px rgba(168, 94, 98, 0.34);
      }

      .ghost:hover {
        box-shadow: none;
      }
    }

    @media (max-width: 560px) {
      .page {
        align-items: end;
        padding: max(18px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
      }

      .card {
        padding: 24px 20px;
      }

      .actions {
        display: grid;
      }

      button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="petals" aria-hidden="true"></div>
    <section class="card" aria-label="早安惊喜">
      <p class="date" id="today"></p>
      <h1 id="headline">早安，亲爱的张舒淇</h1>
      <p class="lead" id="lead">
        今天的第一束光，想先替我抱抱你。愿你醒来时心里轻轻的，像窗边的花刚好被太阳照到。
      </p>
      <div class="actions">
        <button type="button" id="openLetter" aria-expanded="false">打开今天的早安信</button>
        <button type="button" class="ghost" id="newReason">换一个喜欢你的理由</button>
      </div>
      <div class="letter" id="letter" aria-live="polite">
        <div class="letter-inner">
          <p class="note">
            亲爱的，早安。<br>
            昨天辛苦啦，今天也不用急着变得很厉害。你只要慢慢醒来，慢慢吃饭，慢慢把自己照顾好，就已经是我心里很珍贵的一天。<br>
            <span class="reason" id="reason">今天喜欢你的理由：你认真生活的样子，很亮。</span>
          </p>
          <p class="tiny">把这个页面发给她前，可以把网页标题、称呼和这封信改成你们自己的暗号。</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var config = {
        name: "亲爱的张舒淇",
        headline: "早安，亲爱的张舒淇",
        lead: "今天的第一束光，想先替我抱抱你。愿你醒来时心里轻轻的，像窗边的花刚好被太阳照到。",
        reasons: [
          "你认真生活的样子，很亮。",
          "你笑起来的时候，整个早晨都会变软。",
          "你有一种把普通日子过得很可爱的能力。",
          "想到你，连今天的太阳都像是提前来报到。",
          "你不用完美，也已经足够让我心动。"
        ]
      };

      var letter = document.getElementById("letter");
      var reason = document.getElementById("reason");
      var openButton = document.getElementById("openLetter");
      var petals = document.querySelector(".petals");

      function formatToday() {
        var now = new Date();
        try {
          return new Intl.DateTimeFormat("zh-CN", {
            year: "numeric",
            month: "long",
            day: "numeric",
            weekday: "long"
          }).format(now);
        } catch (error) {
          var weekdays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
          return now.getFullYear() + "年" + (now.getMonth() + 1) + "月" + now.getDate() + "日 " + weekdays[now.getDay()];
        }
      }

      function pickReason() {
        var chosen = config.reasons[Math.floor(Math.random() * config.reasons.length)];
        reason.textContent = "今天喜欢" + config.name + "的理由：" + chosen;
      }

      document.title = config.headline;
      document.getElementById("today").textContent = formatToday();
      document.getElementById("headline").textContent = config.headline;
      document.getElementById("lead").textContent = config.lead;

      openButton.addEventListener("click", function () {
        var isOpen = letter.classList.toggle("open");
        openButton.setAttribute("aria-expanded", String(isOpen));
        openButton.textContent = isOpen ? "收起今天的早安信" : "打开今天的早安信";
        if (isOpen) {
          pickReason();
        }
      });

      document.getElementById("newReason").addEventListener("click", function () {
        letter.classList.add("open");
        openButton.setAttribute("aria-expanded", "true");
        openButton.textContent = "收起今天的早安信";
        pickReason();
      });

      for (var i = 0; i < 22; i += 1) {
        var petal = document.createElement("span");
        petal.className = "petal";
        petal.style.left = Math.random() * 100 + "%";
        petal.style.setProperty("--x", (Math.random() - 0.5) * 34 + "vw");
        petal.style.animationDuration = 12 + Math.random() * 12 + "s";
        petal.style.animationDelay = Math.random() * -20 + "s";
        petal.style.transform = "rotate(" + Math.random() * 180 + "deg)";
        petals.appendChild(petal);
      }
    }());
  </script>
</body>
</html>
